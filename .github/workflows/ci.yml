name: CI

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgtest-dev \
            libbenchmark-dev \
            libpcap-dev \

      - name: Configure Release build
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Run tests
        run: |
          ctest \
            --test-dir build \
            --output-on-failure

      - name: Run order book benchmark smoke test
        run: |
          ./build/benchmarks/orderbook_benchmark \
            --benchmark_min_time=0.01s \
            --benchmark_repetitions=1
